          - >
            Reduced global web testing cycles from several days to **90 minutes** by deploying a modular Web Assurance Suite (**Python**, **Playwright**) during a hybrid site migration, automating the validation of 2.9M+ legacy HTML links and ensuring 100% routing coverage for 114 modern **SPA** endpoints.
          - >
            **Engineered a Human-in-the-Loop (HITL) ETL pipeline** (**Python**, **Pandas**) to bypass API constraints; utilized **LanceDB** for semantic embeddings and **JSON prompt injection** to automate data sanitization and dynamic charting.
          - >
            Increased CES categorization accuracy to **98.25%** and eliminated manual data entry by deploying **Chain-of-Thought (CoT)** prompt engineering within **Power Automate**, optimizing multilingual feedback triage.


